<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger Sync — Panel Backup Keuangan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #F1EEE2;
        --bg-panel: #FFFFFF;
        --bg-panel-raised: #F6F3E7;
        --border: #DCD6C1;
        --text: #1E2A23;
        --text-muted: #6B7A70;
        --gold: #A9781F;
        --gold-soft: rgba(169, 120, 31, 0.10);
        --green: #3F7D5C;
        --green-soft: rgba(63, 125, 92, 0.10);
        --red: #A23B30;
        --red-soft: rgba(162, 59, 48, 0.10);

        --font-display: 'Fraunces', serif;
        --font-body: 'IBM Plex Sans', sans-serif;
        --font-mono: 'IBM Plex Mono', monospace;
    }

    * { box-sizing: border-box; }

    body {
    margin: 0;
    background:
        radial-gradient(
            circle at top right,
            rgba(169,120,31,.08),
            transparent 35%
        ),
        var(--bg);

    color: var(--text);
    font-family: var(--font-body);
    line-height: 1.5;
}

    a { color: inherit; }

    .wrap {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px 64px;
}

    /* ===== Header ===== */
    header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 16px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 28px;
    }

    .brand h1 {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 28px;
        margin: 0 0 4px;
        letter-spacing: 0.2px;
    }

    .brand p {
        margin: 0;
        color: var(--text-muted);
        font-size: 14px;
    }

    .pills {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    .pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 7px 13px;
        border-radius: 100px;
        font-family: var(--font-mono);
        font-size: 12px;
        border: 1px solid var(--border);
        background: var(--bg-panel);
        white-space: nowrap;
    }

    .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
    }

    .dot.ok { background: var(--green); box-shadow: 0 0 0 0 rgba(63,125,92,0.5); animation: pulse 2s infinite; }
    .dot.bad { background: var(--red); }
    .dot.wait { background: var(--text-muted); }

    @keyframes pulse {
        0%   { box-shadow: 0 0 0 0 rgba(63,125,92,0.45); }
        70%  { box-shadow: 0 0 0 6px rgba(63,125,92,0); }
        100% { box-shadow: 0 0 0 0 rgba(63,125,92,0); }
    }

    /* ===== Stat row ===== */
    .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
        margin-bottom: 28px;
    }

    .stat-card {
    background: linear-gradient(
        180deg,
        #ffffff 0%,
        #faf8f0 100%
    );

    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    transition: .2s;
}

.stat-card:hover{
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,.05);
}

    .stat-card .label {
        font-size: 12px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
    }

    .stat-card .value {
    font-family: var(--font-display);
    font-size: 32px;
    color: var(--gold);
    margin-top: 4px;
}

    /* ===== Main grid ===== */
 .grid {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

    .panel {
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 1px 2px rgba(30, 42, 35, 0.04);
    }

    .panel-head {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
    }

    .panel-head h2 {
        font-family: var(--font-display);
        font-size: 17px;
        font-weight: 600;
        margin: 0;
    }

    .panel-head .sub {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-muted);
    }

    /* ===== Progress bar ===== */
    .progress-track {
    height: 8px;
    background: #e7e1cd;
    width: 100%;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(
        90deg,
        #A9781F,
        #D3A74D
    );
    width: 0%;
    transition: width 0.35s ease;
}

    /* ===== Live log (ledger timeline) ===== */
   .log-body {
    padding: 18px 20px 20px;
    max-height: 440px;
    overflow-y: auto;
    background: #faf9f5;
}

    .log-empty {
        color: var(--text-muted);
        font-style: italic;
        font-size: 14px;
        padding: 12px 2px;
    }

    .ledger {
        position: relative;
        padding-left: 18px;
        border-left: 1px solid var(--border);
    }

    .entry {
        position: relative;
        padding-bottom: 16px;
        animation: rise 0.3s ease;
    }

    .entry:last-child { padding-bottom: 0; }

    .entry::before {
        content: "";
        position: absolute;
        left: -23px;
        top: 4px;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--bg-panel);
        border: 2px solid var(--gold);
    }

    .entry.ok::before { border-color: var(--green); }
    .entry.bad::before { border-color: var(--red); }

    .entry .meta {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 3px;
    }

    .entry .desc {
        font-size: 14px;
    }

    .entry .desc b { color: var(--gold); font-weight: 600; }
    .entry.ok .desc b { color: var(--green); }
    .entry.bad .desc b { color: var(--red); }

    @keyframes rise {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== Riwayat table ===== */
    .table-wrap {
        max-height: 440px;
        overflow: auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
    }

    thead th {
        position: sticky;
        top: 0;
        background: var(--bg-panel-raised);
        text-align: left;
        font-family: var(--font-mono);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
    }

    tbody td {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        font-family: var(--font-mono);
        color: var(--text);
        white-space: nowrap;
    }

    tbody tr:last-child td { border-bottom: none; }
   tbody tr:nth-child(even){
    background:#fbfaf6;
}

tbody tr:hover{
    background:#f2eedf;
}
    .table-empty {
        padding: 24px 20px;
        color: var(--text-muted);
        font-style: italic;
        font-size: 14px;
    }
    
.live-badge{
    display:inline-block;
    margin-left:8px;
    padding:3px 8px;
    border-radius:999px;
    font-size:10px;
    background:var(--green-soft);
    color:var(--green);
    font-family:var(--font-mono);
    vertical-align:middle;
}
    /* ===== Responsive ===== */
    @media (max-width: 820px) {
        .grid { grid-template-columns: 1fr; }
        .stats { grid-template-columns: 1fr; }
    }

    /* ===== Accessibility ===== */
    :focus-visible {
        outline: 2px solid var(--gold);
        outline-offset: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
        .dot.ok { animation: none; }
        .entry { animation: none; }
        .progress-fill { transition: none; }
    }
</style>
</head>
<body>
<div class="wrap">

   <header>
    <div class="brand">
        <h1>Ledger Sync</h1>
        <p>Sistem Monitoring & Backup Data Keuangan Real-Time</p>
    </div>

    <div style="text-align:right">
        <div style="
            font-size:11px;
            letter-spacing:.12em;
            color:var(--text-muted);
        ">
            STATUS SISTEM
        </div>

        <div style="
            font-family:var(--font-display);
            font-size:30px;
            color:var(--green);
        ">
            ONLINE
        </div>

        <div class="pills" style="margin-top:10px">
            <span class="pill" id="pill-db">
                <span class="dot wait"></span>
                Database: memeriksa…
            </span>

            <span class="pill" id="pill-sse">
                <span class="dot wait"></span>
                Live feed: menyambung…
            </span>
        </div>
    </div>
</header>

    <div class="stats">
        <div class="stat-card">
            <div class="label">Total Backup Tersimpan</div>
            <div class="value" id="stat-total">—</div>
        </div>
        <div class="stat-card">
            <div class="label">Backup Terakhir</div>
            <div class="value" id="stat-terakhir">—</div>
        </div>
        <div class="stat-card">
            <div class="label">Status Server</div>
            <div class="value" id="stat-server">Aktif</div>
        </div>
    </div>

    <div class="grid">
        <section class="panel">
            <div class="panel-head">
                <h2>
    Aktivitas Live
    <span class="live-badge">LIVE</span>
</h2>
                <span class="sub" id="progress-label"></span>
            </div>
            <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
            <div class="log-body" id="log-body">
                <div class="log-empty">Menunggu aktivitas backup masuk…</div>
            </div>
        </section>

        <section class="panel">
            <div class="panel-head">
                <h2>Riwayat Backup</h2>
                <span class="sub" id="riwayat-count"></span>
            </div>
            <div class="table-wrap" id="table-wrap">
                <div class="table-empty">Memuat riwayat backup…</div>
            </div>
        </section>
    </div>

</div>

<script>
    const pillDb = document.getElementById('pill-db');
    const pillSse = document.getElementById('pill-sse');
    const statTotal = document.getElementById('stat-total');
    const statTerakhir = document.getElementById('stat-terakhir');
    const logBody = document.getElementById('log-body');
    const progressFill = document.getElementById('progress-fill');
    const progressLabel = document.getElementById('progress-label');
    const tableWrap = document.getElementById('table-wrap');
    const riwayatCount = document.getElementById('riwayat-count');

    function setPill(el, state, teks) {
        const kelasDot = state === 'ok' ? 'ok' : state === 'bad' ? 'bad' : 'wait';
        el.innerHTML = `<span class="dot ${kelasDot}"></span>${teks}`;
    }

    function jamSekarang() {
        return new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function tambahEntry(html, kelas = '') {
        if (logBody.querySelector('.log-empty')) logBody.innerHTML = '<div class="ledger"></div>';
        const ledger = logBody.querySelector('.ledger');
        const div = document.createElement('div');
        div.className = `entry ${kelas}`;
        div.innerHTML = `<div class="meta">${jamSekarang()}</div><div class="desc">${html}</div>`;
        ledger.appendChild(div);
        logBody.scrollTop = logBody.scrollHeight;
    }

    // ===== Cek koneksi database =====
    fetch('/test_db')
        .then(r => r.json())
        .then(d => {
            if (d.kode === '01') setPill(pillDb, 'ok', 'Database: tersambung');
            else setPill(pillDb, 'bad', 'Database: gagal');
        })
        .catch(() => setPill(pillDb, 'bad', 'Database: gagal'));

    // ===== Live feed (SSE) =====
    const evt = new EventSource('/events');

    evt.onopen = () => setPill(pillSse, 'ok', 'Live feed: tersambung');
    evt.onerror = () => setPill(pillSse, 'bad', 'Live feed: terputus, menyambung ulang…');

    evt.onmessage = (e) => {
        const data = JSON.parse(e.data);

        if (data.status === 'mulai') {
            progressFill.style.width = '0%';
            progressLabel.textContent = `0 / ${data.total}`;
            tambahEntry(`Memulai backup — <b>${data.total}</b> transaksi terdeteksi`);
        } else if (data.status === 'progress') {
            const persen = Math.round((data.selesai / data.total) * 100);
            progressFill.style.width = persen + '%';
            progressLabel.textContent = `${data.selesai} / ${data.total}`;
            tambahEntry(`${data.deskripsi || 'Transaksi diproses'}`);
        } else if (data.status === 'selesai') {
            progressFill.style.width = '100%';
            progressLabel.textContent = 'Selesai';
            tambahEntry(`Backup selesai — <b>${data.berhasil} berhasil</b>, ${data.gagal} gagal`, 'ok');
            muatRiwayat();
        } else if (data.status === 'gagal') {
            tambahEntry(`Proses backup gagal di server`, 'bad');
        }
    };

    // ===== Riwayat backup =====
    function muatRiwayat() {
        fetch('/daftar_backup')
            .then(r => r.json())
            .then(json => {
                if (json.kode !== '01' || !Array.isArray(json.data) || json.data.length === 0) {
                    tableWrap.innerHTML = '<div class="table-empty">Belum ada data backup tersimpan.</div>';
                    statTotal.textContent = '0';
                    statTerakhir.textContent = '—';
                    riwayatCount.textContent = '';
                    return;
                }

                const rows = json.data;
                const kolom = Object.keys(rows[0]);

                let html = '<table><thead><tr>';
                kolom.forEach(k => html += `<th>${k}</th>`);
                html += '</tr></thead><tbody>';
                rows.forEach(row => {
                    html += '<tr>' + kolom.map(k => `<td>${row[k] ?? ''}</td>`).join('') + '</tr>';
                });
                html += '</tbody></table>';

                tableWrap.innerHTML = html;
                statTotal.textContent = rows.length;
                statTerakhir.textContent = rows[0][kolom[kolom.length - 1]] ?? '—';
                riwayatCount.textContent = `${rows.length} entri`;
            })
            .catch(() => {
                tableWrap.innerHTML = '<div class="table-empty">Gagal memuat riwayat backup.</div>';
            });
    }

    muatRiwayat();
</script>
</body>
</html>
